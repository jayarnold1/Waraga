<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waraga</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <span>Waraga</span>
        </div>
        
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-links" id="navLinks">
            <a href="index.html" class="active">Beranda</a>
            <a href="#" id="navDashboard" style="display:none;">Dashboard Admin</a>
            <a href="login.html" id="navLogin" class="login-btn">Masuk sebagai Admin</a>
            <a href="#" id="navLogout" style="display:none;" class="logout-btn">Keluar</a>
        </div>
    </div>
</nav>

    <main class="container">
        <div class="hero">
            <h1>Wa<span class="highlight">raga</span></h1>
            <p>Platform dokumentasi sederhana untuk keperluan mendesak</p>
            <div id="heroButtons">
                <button class="btn-primary" id="createDocBtn" style="display:none;">Buat Dokumen Baru</button>
                <button class="btn-secondary" id="manageDocsBtn" style="display:none;">Kelola Dokumen</button>
            </div>
        </div>

        <!-- Folder Section - Hanya menampilkan folder di root -->
        <div class="folders-section">
            <h2><i class="fas fa-folder-tree"></i> Folder & Dokumen</h2>
            <div class="folders-grid" id="foldersGrid">
                <!-- Folder dan dokumen akan dimuat di sini -->
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/view.js"></script>
</body>
</html>
