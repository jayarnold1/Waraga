<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Dokumen - Waraga</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <span>Waraga</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="#" id="viewLoginBtn" class="login-btn">Masuk sebagai Admin</a>
                <a href="#" id="viewLogoutBtn" style="display:none;" class="logout-btn">Keluar</a>
            </div>
        </div>
    </nav>

    <main class="view-container">
        <div class="view-header">
            <h1 id="viewTitle">Loading...</h1>
            <div id="viewAdminActions" style="display:none;">
                <button class="btn-edit" id="editDocBtn"><i class="fas fa-edit"></i> Edit Dokumen</button>
            </div>
        </div>
        <div class="view-content" id="viewContent">
            <!-- Konten akan dimuat di sini -->
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/view.js"></script>
</body>
</html>
